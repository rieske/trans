name: build

# push: only default branch (avoids double runs with pull_request on feature branches)
on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov nasm

      - name: Configure
        run: make configure

      - name: Build
        run: make

      # Serial ctest: functionalTest shards share .gcda and race under ctest -j.
      - name: Test
        run: make test JOBS=1

      - name: Coverage report
        run: make coverage-report

      # Do not set base-path: lcov SF: paths are already repo-relative (src/...),
      # and base-path + relative SF mangles names (e.g. home/runner/work/...) → Coveralls 500.
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: build/coverage/lcov.info
          format: lcov
          # PR builds: report the PR head (not the ephemeral merge commit).
          git-branch: ${{ github.head_ref || github.ref_name }}
          git-commit: ${{ github.event.pull_request.head.sha || github.sha }}
